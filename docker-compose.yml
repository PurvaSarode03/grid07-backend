services:
  postgres:
    image: postgres:15
    container_name: grid07_postgres
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: grid07db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: grid07_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: